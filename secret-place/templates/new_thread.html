{% extends "layout.html" %}
{% block content %}

<h2>Create Thread</h2>

<form method="POST">
    <input type="text" name="title" placeholder="Thread title" required>

    <select name="group_id">
        <option value=""> Global Thread</option>

        {% for g in user_groups %}
            <option value="{{ g[0] }}">{{ g[1] }} — Leader: {{ g[3] }}</option>
        {% endfor %}
    </select>

    <button type="submit">Create</button>
</form>

{% endblock %}
