{% extends "layout.html" %}

{% block content %}
<div class="container">
    <h1>Admin - User Management</h1>

    <p>Use this page to manage user roles.</p>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Current Role</th>
                <th>Change Role</th>
            </tr>
        </thead>

        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user[1] }}</td>
                <td>{{ user[2] }}</td>
                <td>{{ user[3] }}</td>
                <td>
                    <form method="POST" action="{{ url_for('admin.update_user_role', user_id=user[0]) }}" style="display: flex; gap: 8px; align-items: center;">
    
                        <select name="role">
                            <option value="member" {% if user[3] == "member" %}selected{% endif %}>Member</option>
                            <option value="leader" {% if user[3] == "leader" %}selected{% endif %}>Leader</option>
                            <option value="admin" {% if user[3] == "admin" %}selected{% endif %}>Admin</option>
                        </select>

                        <button type="submit">Update</button>
                    </form>
                </td>
                <td>        
                    <form id="delete-user-{{ user[0] }}" method="POST" action="{{ url_for('admin.delete_user', user_id=user[0]) }}" style="display:inline; margin-left:10px;">
                    </form>

                    <button type="button" class="btn btn-secondary" data-confirm="Are you sure you want to deactivate this user?" data-form="delete-user-{{ user[0] }}">Delete</button>
                </td>
                <td>    
                    <a href="{{ url_for('admin.edit_user', user_id=user[0]) }}" class="btn btn-secondary" style="margin-left:8px;">Edit</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
