{% extends "layout.html" %}
{% block content %}

<section class="home-hero">

    <h1>Welcome to Secret Place</h1>

    <p class="lead">
        A place for spiritual growth, Bible reading, and community.
    </p>

    <img src="{{ url_for('static', filename='images/logo_blue_no_bg.png') }}"
         alt="Secret Place Logo"
         class="home-logo">

    <div class="home-buttons">
        <a href="{{ url_for('auth.login') }}" class="btn btn-primary">
            Login
        </a>

        <a href="{{ url_for('auth.register') }}" class="btn btn-secondary">
            Register
        </a>
    </div>

</section>

{% endblock %}
