{% extends "layout.html" %}
{% block content %}

<h2>Pending Prayer Requests (Moderation)</h2>

<ul>
    {% for r in requests %}
        <li>
            <p>{{ r.text }}</p>
            <small>{{ r.date }}</small>

            <div class="action-buttons">

            <!-- APPROVE -->
            <form id="approve-request-{{ r.id }}"
                method="POST"
                action="{{ url_for('prayer_requests.approve_request', request_id=r.id) }}">

                <button type="button"
                        class="btn btn-success"
                        data-confirm="Approve this request?"
                        data-form="approve-request-{{ r.id }}">
                    Approve
                </button>
            </form>

            <!-- DELETE -->
            <form id="delete-request-{{ r.id }}"
                method="POST"
                action="{{ url_for('prayer_requests.delete_request', request_id=r.id) }}">

                <button type="button"
                        class="btn btn-danger"
                        data-confirm="Delete this request?"
                        data-form="delete-request-{{ r.id }}">
                    Delete
                </button>
            </form>

        </div>
        </li>
    {% else %}
        <li>No pending requests.</li>
    {% endfor %}
</ul>

{% endblock %}
