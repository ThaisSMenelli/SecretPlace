{% extends "layout.html" %}
{% block content %}

<h2>Pending Threads</h2>

<ul>
  {% for t in threads %}
    <li>
      {{ t.title }} ({{ t.created_at }})

        <div class="action-buttons">
            <form id="approve-thread-{{ t.id }}"
                  method="POST"
                  action="{{ url_for('discussions.approve_thread_route', thread_id=t.id) }}">

                <button type="button"
                        class="btn btn-success"
                        data-confirm="Approve this thread?"
                        data-form="approve-thread-{{ t.id }}">
                      Approve
                </button>

            </form>

            <form id="delete-thread-{{ t.id }}"
                  method="POST"
                  action="{{ url_for('discussions.delete_thread_route', thread_id=t.id) }}">

                <button type="button"
                        class="btn btn-danger"
                        data-confirm="Delete this thread?"
                        data-form="delete-thread-{{ t.id }}">
                      Delete
                </button>

            </form>
        </div>
    </li>
  {% else %}
    <li>No pending threads.</li>
  {% endfor %}
</ul>

{% endblock %}
